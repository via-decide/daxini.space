<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Launchpad | Daxini Space</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070e;
      --card: #101828;
      --accent: #16c6ff;
      --text: #dbe7ff;
      --muted: #95a2bf;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #10233f, var(--bg));
      color: var(--text);
      padding: 20px;
    }

    .app-card {
      width: min(640px, 100%);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(22, 198, 255, 0.25);
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 10px 45px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
    }

    .meta {
      color: var(--muted);
      margin-top: 10px;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      text-decoration: none;
      color: #00131f;
      background: var(--accent);
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 700;
    }

    .button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(149, 162, 191, 0.6);
    }
  </style>
</head>
<body>
  <main class="app-card">
    <h1 id="app-name">App Name</h1>
    <p class="meta" id="app-creator">Creator: Unknown</p>
    <div class="actions">
      <a id="launch-app" class="button" href="#">Launch App</a>
      <a id="duplicate-logichub" class="button secondary" href="https://logichub.app" target="_blank" rel="noreferrer">Duplicate in Logichub</a>
    </div>
  </main>

  <script>
    (function hydrateTemplate() {
      const appContext = window.APP_PAGE_CONTEXT || {};
      const appName = appContext.name || 'Untitled App';
      const creator = appContext.creator || 'Unknown';
      const launchUrl = appContext.launchUrl || '#';
      const duplicateUrl = appContext.duplicateUrl || 'https://logichub.app';

      document.getElementById('app-name').textContent = appName;
      document.getElementById('app-creator').textContent = `Creator: ${creator}`;
      document.getElementById('launch-app').setAttribute('href', launchUrl);
      document.getElementById('duplicate-logichub').setAttribute('href', duplicateUrl);
    })();
  </script>
</body>
</html>
